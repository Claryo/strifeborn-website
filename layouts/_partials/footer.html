<footer class="site-footer">
    <div class="container">
        <div class="lp-footer-content">
            <div class="lp-footer-brand">
                <h3>{{ .Site.Title }}</h3>
                <p>{{ .Site.Params.description }}</p>
                <p class="lp-footer-status">Status: <span class="status-badge">{{ .Site.Params.game.status }}</span></p>
            </div>

            <div class="lp-footer-social">
                {{ if .Site.Params.social.twitter }}
                <a href="{{ .Site.Params.social.twitter }}" target="_blank" rel="noopener" class="social-link">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
                    X (Twitter)
                </a>
                {{ end }}
                {{ if .Site.Params.social.email }}
                <a href="mailto:{{ .Site.Params.social.email }}" class="social-link">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                    contact@strifeborn.com
                </a>
                {{ end }}
            </div>
        </div>

        <div class="footer-bottom">
            <p>&copy; {{ now.Year }} {{ .Site.Title }}. Created by {{ .Site.Params.author }}.</p>
        </div>
    </div>
</footer>
