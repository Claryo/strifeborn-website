{{ define "main" }}
<article class="single-page">
    <div class="container">
        <header class="page-header">
            <h1>{{ .Title }}</h1>
            {{ if .Params.subtitle }}
            <p class="page-subtitle">{{ .Params.subtitle }}</p>
            {{ end }}
            {{ if .Date }}
            <div class="page-meta">
                <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "January 2, 2006" }}</time>
            </div>
            {{ end }}
        </header>
        
        <div class="page-content">
            {{ .Content }}
        </div>
    </div>
</article>
{{ end }}
