{{ define "main" }}
<div class="container">
    <a href="{{ .Parent.Permalink }}" class="back-link">← {{ .Parent.Title }}</a>
    <article class="post-page">
        <div class="post-content">
            <header class="post-header">
                {{ if .Date }}
                <div class="post-meta">
                    <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "January 2, 2006" }}</time>
                    {{ if .Params.author }} · {{ .Params.author }}{{ end }}
                </div>
                {{ end }}
                <h1>{{ .Title }}</h1>
            </header>
            <div class="post-body">
                {{ .Content }}
            </div>
        </div>
    </article>
</div>
{{ end }}
