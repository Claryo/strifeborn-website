baseURL = "https://strifeborn.com"
languageCode = "en-us"
title = "Strifeborn"
# theme = ""

# Pagination
paginate = 10

# Taxonomies (categories and tags)
[taxonomies]
  faction = "factions"
  class = "classes"
  tag = "tags"

# Site parameters
[params]
  description = "Master synergies, command heroes, conquer the Strife"
  author = "Claryo Dev"
  
  # Social links
  [params.social]
    twitter = "https://x.com/ClaryoDev"
    linkedin = "https://www.linkedin.com/in/alexan-viel-211659141/"
    email = "contact@strifeborn.com"
  
  # Formspree contact form endpoint ID (get it from formspree.io after creating a form)
  # Example: formspree_id = "xabc1234"
  formspree_id = "mgopnvrv"

  # Game info
  [params.game]
    status = "In Development"
    tagline = "Tactical Auto-Battler with Deep Strategic Depth"

# Menu configuration — landing page only, no compendium nav
[menu]

# Markup settings
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "monokai"
